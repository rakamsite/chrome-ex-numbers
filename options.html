<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saved Numbers</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <main class="dashboard">
    <h1>شماره‌های ذخیره شده</h1>
    <section class="toolbar">
      <button id="exportBtn">Export CSV</button>
      <label class="file-btn">Import CSV<input id="importFile" type="file" accept=".csv,text/csv"></label>
      <button id="deleteAllBtn" class="danger">Delete All</button>
    </section>
    <section class="table-card">
      <table>
        <thead><tr><th>نام سایت</th><th>شماره تلفن</th><th>Actions</th></tr></thead>
        <tbody id="recordsBody"></tbody>
      </table>
    </section>
    <p id="message" class="message"></p>
  </main>
  <script src="utils.js"></script>
  <script src="storage.js"></script>
  <script src="options.js"></script>
</body>
</html>
