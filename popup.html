<!doctype html>
<html lang="fa">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Torob Batch Runner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="card">
      <label for="torobLinks">لینک‌های ترب (هر خط یک لینک)</label>
      <textarea id="torobLinks" class="mobile-editor" rows="8" placeholder="torob.com/shop/100000&#10;torob.com/shop/100100"></textarea>
    </section>
    <footer class="actions">
      <button id="startBtn" class="primary">Start</button>
      <button id="dashboardBtn">Open Dashboard</button>
    </footer>
    <p id="message" class="message" role="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
